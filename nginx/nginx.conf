# ─────────────────────────────────────────────────────────────────────────────
# Reverse Proxy – BrawlTracker
#
# Routing:
#   deinedomain.de         →  Frontend-Container  (Port 80)
#   api.deinedomain.de     →  Backend-Container   (Port 29678)
#
# TLS-Terminierung:
#   Für Produktion mit echten Zertifikaten die HTTPS-Blöcke auskommentieren
#   und Zertifikatspfade anpassen (z. B. via Certbot/Let's Encrypt).
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Timeouts & Buffer ─────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    client_max_body_size  10m;

    # ── Upstream: Frontend ────────────────────────────────────────────────────
    upstream frontend {
        server frontend:80;
    }

    # ── Upstream: Backend ─────────────────────────────────────────────────────
    upstream backend {
        server backend:29678;
    }

    # ── Server: deinedomain.de → Frontend ────────────────────────────────────
    server {
        listen 80;
        server_name deinedomain.de www.deinedomain.de;

        # Sicherheits-Header
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy        "strict-origin" always;

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Server: api.deinedomain.de → Backend ─────────────────────────────────
    server {
        listen 80;
        server_name api.deinedomain.de;

        # Sicherheits-Header
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy        "strict-origin" always;

        # CORS – nur eigene Frontend-Domain erlauben
        add_header Access-Control-Allow-Origin  "https://deinedomain.de" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"     always;
        add_header Access-Control-Allow-Headers "Content-Type"           always;

        location / {
            # Preflight-Anfragen direkt beantworten
            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
