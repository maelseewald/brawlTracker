# ─────────────────────────────────────────────────────────────────────────────
# Lokale Entwicklungs-Overrides
#
# Verwendung:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Unterschiede zu Produktion:
#   - PostgreSQL-Port 5432 wird auf Host-Port 3838 gemappt
#     (damit Gradle flywayMigrate und die IDE direkten DB-Zugriff haben)
#   - Backend- und Frontend-Container werden NICHT gebaut;
#     stattdessen laufen sie als lokale Prozesse außerhalb von Docker.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    ports:
      - "3838:5432"
