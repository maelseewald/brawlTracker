# SPA-Konfiguration für den Frontend-Container (nginx innerhalb des frontend-Containers).
# Dieser nginx-Prozess bedient ausschließlich die statischen Vite-Assets.
# Das eigentliche Routing (deinedomain.de vs. api.deinedomain.de) übernimmt
# der Reverse-Proxy-Container (siehe /nginx/nginx.conf im Root).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-Komprimierung
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # SPA-Fallback: alle Routen → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets dauerhaft cachen (Vite erzeugt Content-Hashes im Dateinamen)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html niemals cachen
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
